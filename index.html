<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary Polisher Pro - 英文日记精修助手</title>
    <!-- 引入核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 打印样式：确保 PDF 导出完美呈现 */
        @media print {
            nav, .no-print, button, select, input { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            main { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .print-container { display: block !important; }
            .print-header { display: flex !important; justify-content: space-between !important; border-bottom: 4px solid #4f46e5 !important; padding-bottom: 2rem !important; margin-bottom: 2rem !important; }
            .print-stats { display: grid !important; grid-template-cols: repeat(3, 1fr) !important; gap: 1rem !important; margin-bottom: 2rem !important; }
            .print-card { border: 2px solid #f1f5f9 !important; border-radius: 1.5rem !important; padding: 2rem !important; margin-bottom: 2rem !important; page-break-inside: avoid !important; }
            .bg-blue-100 { background-color: #dbeafe !important; }
            .bg-yellow-100 { background-color: #fef9c3 !important; }
            .bg-emerald-100 { background-color: #d1fae5 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#FDFDFE] text-slate-900 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 图标助手
        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const CEFR_LEVELS = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
        const HIGHLIGHT_TYPES = {
            collocation: { color: 'bg-blue-100 text-blue-800 border-blue-200', label: '固定搭配', icon: '🔵' },
            structure: { color: 'bg-yellow-100 text-yellow-800 border-yellow-200', label: '精彩句型', icon: '🟡' },
            phrase: { color: 'bg-emerald-100 text-emerald-800 border-emerald-200', label: '核心词组', icon: '🟢' }
        };

        const App = () => {
            const [inputText, setInputText] = useState('');
            const [targetLevel, setTargetLevel] = useState('C1');
            const [isProcessing, setIsProcessing] = useState(false);
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [view, setView] = useState('editor');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [currentMonth, setCurrentMonth] = useState(new Date());

            // ==========================================
            // API Key 配置说明：
            // 方式一：URL 参数传递 ?api_key=你的密钥
            // 方式二：直接在这里填入（仅本地测试使用）
            // ==========================================
            const getApiKey = () => {
                const urlParams = new URLSearchParams(window.location.search);
                const urlKey = urlParams.get('api_key');
                if (urlKey) return urlKey;
                return '';
            };
            const apiKey = getApiKey(); 

            // 数据持久化
            useEffect(() => {
                const saved = localStorage.getItem('diary_polisher_final');
                if (saved) setHistory(JSON.parse(saved));
                if (window.lucide) lucide.createIcons();
            }, [view, result]);

            const stats = useMemo(() => {
                const totalWords = history.reduce((acc, h) => acc + (h.original?.trim().split(/\s+/).length || 0), 0);
                const totalHighlights = history.reduce((acc, h) => acc + (h.highlights?.length || 0), 0);
                const streak = history.length > 0 ? [...new Set(history.map(h=>h.date))].length : 0;
                return { totalWords, totalHighlights, streak };
            }, [history]);

            const polishDiary = async () => {
                if (!inputText.trim() || isProcessing) return;
                if (!apiKey) { alert("请先在代码中填入 API Key！"); return; }
                
                setIsProcessing(true);
                const systemPrompt = `You are an elite English Mentor. 
                Rewrite the text to ${targetLevel} CEFR level. 
                Identify 8-15 points (structure, collocation, phrase). 
                Provide exhaustive explanations in CHINESE. 
                Return JSON ONLY: {"original_level":"...", "polished_text":"...", "highlights":[{"text":"...", "type":"phrase", "explanation":"..."}], "feedback":"..."}`;
                
                try {
                    // 使用正确的 Gemini 模型名称
                    const modelName = 'gemini-1.5-flash';
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Original Draft: ${inputText}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();

                    // 调试：打印完整响应（生产环境应移除）
                    console.log('API Response:', data);

                    if (data.error) {
                        throw new Error(data.error.message || 'API 调用失败');
                    }
                    if (!data.candidates || !data.candidates[0]) {
                        throw new Error('API 返回数据格式错误，请检查 API Key');
                    }

                    const resJson = JSON.parse(data.candidates[0].content.parts[0].text);
                    
                    setResult(resJson);
                    const newEntry = { 
                        date: selectedDate, 
                        original: inputText, 
                        polished: resJson.polished_text, 
                        highlights: resJson.highlights, 
                        feedback: resJson.feedback, 
                        level: resJson.original_level, 
                        target: targetLevel 
                    };
                    const updated = [newEntry, ...history.filter(h => h.date !== selectedDate)];
                    setHistory(updated);
                    localStorage.setItem('diary_polisher_final', JSON.stringify(updated));
                } catch (e) {
                    alert("精修出错，请检查网络或 API Key: " + e.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            // 日历生成
            const calendarDays = useMemo(() => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) {
                    const d = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                    days.push({ day: i, date: d, hasEntry: history.some(h => h.date === d) });
                }
                return days;
            }, [currentMonth, history]);

            return (
                <div className="min-h-screen">
                    {/* 顶部导航 */}
                    <nav className="bg-white/90 border-b px-8 py-4 flex items-center justify-between sticky top-0 z-50 no-print">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl shadow-lg"><Icon name="sparkles" className="text-white w-6 h-6" /></div>
                            <div>
                                <h1 className="font-black text-lg tracking-tighter">Diary Polisher Pro</h1>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">English Mastery System</span>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 p-1.5 rounded-2xl border">
                            <button onClick={() => setView('editor')} className={`px-6 py-2 rounded-xl text-sm font-black transition-all ${view === 'editor' ? 'bg-white shadow-md text-indigo-600' : 'text-slate-500'}`}>写作精修</button>
                            <button onClick={() => setView('history')} className={`px-6 py-2 rounded-xl text-sm font-black transition-all ${view === 'history' ? 'bg-white shadow-md text-indigo-600' : 'text-slate-500'}`}>打卡日历</button>
                        </div>
                        <div className="hidden md:flex gap-6 text-center">
                            <div><div className="text-[10px] font-black text-slate-300 uppercase">连胜</div><div className="font-black text-indigo-600">{stats.streak}d</div></div>
                            <div><div className="text-[10px] font-black text-slate-300 uppercase">词数</div><div className="font-black text-emerald-600">{stats.totalWords}</div></div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-6 lg:p-12">
                        {view === 'editor' ? (
                            <div className="space-y-10">
                                
                                {/* 打印专用页眉 */}
                                <div className="hidden print:block print-header">
                                    <div>
                                        <div className="text-indigo-600 font-black text-sm uppercase tracking-[0.3em] mb-2">Diary Polisher Pro</div>
                                        <h1 className="text-5xl font-black text-slate-900 tracking-tighter">英语日记学习报告</h1>
                                        <p className="text-slate-500 font-bold text-lg mt-2 italic">{selectedDate} | 目标等级: {targetLevel}</p>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-[10px] font-black text-slate-400 uppercase mb-1">Growth Status</div>
                                        <div className="text-3xl font-black text-indigo-600 italic">Level Up!</div>
                                    </div>
                                </div>

                                {/* 数据卡片 */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-indigo-600 text-white p-8 rounded-[2.5rem] flex items-center gap-6 shadow-xl shadow-indigo-100 print-card">
                                        <div className="bg-white/20 p-4 rounded-3xl no-print"><Icon name="trophy" className="w-8 h-8" /></div>
                                        <div><div className="text-xs font-bold opacity-70 uppercase tracking-widest">当前连胜</div><div className="text-4xl font-black">{stats.streak} Days</div></div>
                                    </div>
                                    <div className="bg-white border-2 border-slate-50 p-8 rounded-[2.5rem] flex items-center gap-6 print-card">
                                        <div className="bg-emerald-50 p-4 rounded-3xl text-emerald-600 no-print"><Icon name="file-text" className="w-8 h-8" /></div>
                                        <div><div className="text-xs font-bold text-slate-400 uppercase tracking-widest">累计总词数</div><div className="text-4xl font-black text-slate-800">{stats.totalWords}</div></div>
                                    </div>
                                    <div className="bg-white border-2 border-slate-50 p-8 rounded-[2.5rem] flex items-center gap-6 print-card">
                                        <div className="bg-amber-50 p-4 rounded-3xl text-amber-600 no-print"><Icon name="zap" className="w-8 h-8" /></div>
                                        <div><div className="text-xs font-bold text-slate-400 uppercase tracking-widest">精华要点</div><div className="text-4xl font-black text-slate-800">{stats.totalHighlights}</div></div>
                                    </div>
                                </div>

                                {/* 双栏对比区 */}
                                <div className="grid lg:grid-cols-2 gap-10">
                                    {/* 左栏：原稿 */}
                                    <div className="flex flex-col min-h-[550px] bg-white rounded-[3rem] border-2 border-slate-100 shadow-sm overflow-hidden print-card">
                                        <div className="px-8 py-6 border-b flex justify-between items-center bg-slate-50/20 no-print">
                                            <span className="text-xs font-black uppercase tracking-[0.2em] text-slate-400">My Original Draft</span>
                                            <input type="date" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} className="text-xs font-bold border rounded-lg px-2 py-1" />
                                        </div>
                                        <textarea value={inputText} onChange={e => setInputText(e.target.value)} placeholder="在此输入英文日记初稿..." className="flex-1 p-10 text-xl leading-relaxed border-none focus:ring-0 resize-none text-slate-600 font-medium no-print" />
                                        
                                        <div className="hidden print:block p-4">
                                            <h3 className="text-[10px] font-black text-slate-300 uppercase mb-4 border-b pb-2">原始草稿 (Original Draft)</h3>
                                            <div className="text-slate-500 italic text-sm whitespace-pre-wrap">{inputText || "无内容"}</div>
                                        </div>

                                        <div className="p-8 flex justify-between items-center bg-slate-50/20 no-print">
                                            <select value={targetLevel} onChange={e => setTargetLevel(e.target.value)} className="bg-white border rounded-xl px-4 py-2 text-sm font-black text-indigo-600 cursor-pointer">
                                                {CEFR_LEVELS.slice(2).map(l => <option key={l} value={l}>{l} Professional</option>)}
                                            </select>
                                            <button onClick={polishDiary} disabled={isProcessing || !inputText.trim()} className="bg-indigo-600 text-white px-10 py-4 rounded-[1.5rem] font-black text-sm flex items-center gap-3 shadow-xl hover:scale-105 transition-all">
                                                {isProcessing ? <Icon name="loader-2" className="w-5 h-5 animate-spin" /> : <Icon name="send" className="w-5 h-5" />} 提交并分析
                                            </button>
                                        </div>
                                    </div>

                                    {/* 右栏：精修结果 */}
                                    <div className="flex flex-col min-h-[550px] bg-white rounded-[3rem] border-2 border-indigo-50 shadow-xl overflow-hidden print-card">
                                        <div className="px-8 py-6 border-b flex justify-between items-center bg-indigo-50/5 no-print">
                                            <span className="text-xs font-black uppercase tracking-[0.2em] text-indigo-500 flex items-center gap-2"><Icon name="sparkles" className="w-4 h-4" /> Mentored Version</span>
                                            {result && <button onClick={() => window.print()} className="flex items-center gap-2 text-xs font-black text-slate-400 hover:text-indigo-600 transition-all border-l pl-4"><Icon name="printer" className="w-4 h-4" /> 导出 PDF 报告</button>}
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-10">
                                            {isProcessing ? <div className="h-full flex flex-col items-center justify-center opacity-30 animate-pulse"><Icon name="loader-2" className="w-12 h-12 mb-4 animate-spin" /><p className="font-black uppercase tracking-widest">智能分析中...</p></div> : 
                                            result ? (
                                                <div className="space-y-12">
                                                    <div className="hidden print:block text-[10px] font-black text-indigo-500 uppercase mb-4 border-b pb-2">专家精修版本 (Polished Version)</div>
                                                    <div className="text-xl leading-[2] text-slate-800 font-medium whitespace-pre-wrap">{result.polished_text}</div>
                                                    <div className="space-y-6">
                                                        <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2"><Icon name="layers" className="w-4 h-4" /> 深度亮点解析</h4>
                                                        <div className="grid gap-4">
                                                            {result.highlights.map((hl, i) => (
                                                                <div key={i} className={`p-6 rounded-[2rem] border-2 ${HIGHLIGHT_TYPES[hl.type]?.color || 'bg-slate-50'}`}>
                                                                    <div className="font-black text-lg text-slate-800">{hl.text}</div>
                                                                    <div className="text-xs font-bold opacity-70 mt-2 leading-relaxed">{hl.explanation}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div className="p-10 bg-slate-900 rounded-[3rem] text-white shadow-2xl print:bg-slate-50 print:text-slate-900 print:shadow-none print:border-4">
                                                        <h4 className="text-xs font-black uppercase tracking-widest mb-4 opacity-50">导师评语</h4>
                                                        <p className="leading-relaxed font-bold text-xl">{result.feedback}</p>
                                                    </div>
                                                </div>
                                            ) : <div className="h-full flex flex-col items-center justify-center opacity-20"><Icon name="book-open" className="w-16 h-16 mb-4" /><p className="font-black tracking-widest uppercase">Waiting for Draft</p></div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-10 animate-in slide-in-from-bottom-12 duration-700">
                                <div className="flex items-center justify-between">
                                    <h2 className="text-4xl font-black italic tracking-tighter">Journal Archive.</h2>
                                    <div className="flex gap-4">
                                        <button onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth()-1)))} className="p-2 border rounded-xl hover:bg-slate-100"><Icon name="chevron-left" className="w-5 h-5"/></button>
                                        <span className="font-black text-xl min-w-[120px] text-center">{currentMonth.getFullYear()}年 {currentMonth.getMonth()+1}月</span>
                                        <button onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth()+1)))} className="p-2 border rounded-xl hover:bg-slate-100"><Icon name="chevron-right" className="w-5 h-5"/></button>
                                    </div>
                                </div>
                                <div className="bg-white p-12 rounded-[4rem] border shadow-sm grid grid-cols-7 gap-6">
                                    {['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].map(d => <div key={d} className="text-center text-[10px] font-black text-slate-300 py-4">{d}</div>)}
                                    {calendarDays.map((d, i) => (
                                        <div key={i} onClick={() => { if(d?.hasEntry) { const h = history.find(item => item.date === d.date); setInputText(h.original); setResult({polished_text: h.polished, highlights: h.highlights, feedback: h.feedback}); setView('editor'); } }}
                                             className={`aspect-square rounded-2xl flex items-center justify-center text-xl font-black cursor-pointer transition-all ${!d ? 'invisible' : d.hasEntry ? 'bg-indigo-600 text-white shadow-xl scale-105' : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>
                                            {d?.day}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
